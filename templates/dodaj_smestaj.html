{% extends "index.html" %}

{% block content %}

<form method="post">
    Naziv hotela:<br>
    <input type="text" name="naziv"><br><br>

    Grad:<br>
    <select name="gradID" required>
        <option value="1">Tokio</option>
        <option value="2">Bec</option>
        <option value="3">Grac</option>
        <option value="4">Beograd</option>
    </select><br><br>

    Adresa:<br>
    <input type="text" name="adresa" required><br><br>

    Zvezdice:<br>
    <input type="number" name="zvezdice" min="1" max="5" required><br><br>

    Ljubimci:<br>
    <select name="ljubimci" required>
        <option value="1">Da</option>
        <option value="0">Ne</option>
    </select><br><br>

    Vrsta smestaja:<br>
    <input type="text" name="vrsta_smestaja" required><br><br>

    Obrok:<br>
    <input type="text" name="obrok" required><br><br>

    <button type="submit">Upisati podatke</button>
</form>

{% endblock %}
